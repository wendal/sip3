# coturn TURN server configuration
# This file is used when running coturn via Docker.
# Override the following settings with environment variables in docker-compose.yml.

# Do not detach (run in foreground for Docker)
no-daemon

# Log to stdout
log-file=stdout

# Disable CLI management interface (not needed in Docker)
no-cli

# Listening ports
listening-port=3478
tls-listening-port=5349

# External (public) IP of the server — MUST match the host's public address.
# Set via COTURN_EXTERNAL_IP environment variable in docker-compose.
# external-ip=<YOUR_PUBLIC_IP>

# Relay ports allocated per session
min-port=49152
max-port=49200

# Realm (should match SIP domain / auth realm)
realm=sip.air32.cn

# Use HMAC-SHA1 time-limited credentials (matches /api/turn/credentials in sip3 backend)
use-auth-secret

# Shared secret — MUST match SIP3__TURN__SECRET in backend configuration.
# Change this in production!
static-auth-secret=change_me_in_production_secret

# Security: deny relaying to private/loopback addresses (prevents SSRF via TURN)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.1
denied-peer-ip=::1

# Quota per user/realm
total-quota=200
max-bps=1000000
