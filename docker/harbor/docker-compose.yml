# Harbor deployment stack for a self-hosted registry.
#
# This compose file follows Harbor's generated layout and expects the
# corresponding `./common/config` files to exist (normally produced by Harbor's
# `prepare` step from `harbor.yml`).
#
# Adjust HARBOR_VERSION to match the Harbor release you downloaded.

services:
  log:
    image: goharbor/harbor-log:${HARBOR_VERSION:-2.11.0}
    container_name: harbor-log
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - ${HARBOR_DATA_VOLUME:-/data}/log:/var/log/docker
      - ./common/config/log/logrotate.conf:/etc/logrotate.d/logrotate.conf:ro
      - ./common/config/log/rsyslog_docker.conf:/etc/rsyslog.d/rsyslog_docker.conf:ro
    ports:
      - "127.0.0.1:${HARBOR_LOG_PORT:-1514}:10514"
    networks:
      - harbor

  postgresql:
    image: goharbor/harbor-db:${HARBOR_VERSION:-2.11.0}
    container_name: harbor-db
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    shm_size: 1gb
    env_file:
      - ./common/config/db/env
    volumes:
      - ${HARBOR_DATA_VOLUME:-/data}/database:/var/lib/postgresql/data
    depends_on:
      - log
    networks:
      - harbor

  redis:
    image: goharbor/valkey-photon:${HARBOR_VERSION:-2.11.0}
    container_name: harbor-redis
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ${HARBOR_DATA_VOLUME:-/data}/redis:/var/lib/redis
    depends_on:
      - log
    networks:
      - harbor

  registry:
    image: goharbor/registry-photon:${HARBOR_VERSION:-2.11.0}
    container_name: harbor-registry
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ${HARBOR_DATA_VOLUME:-/data}/registry:/storage
      - ./common/config/registry/:/etc/registry/:ro
      - ${HARBOR_DATA_VOLUME:-/data}/secret/registry/root.crt:/etc/registry/root.crt:ro
      - ./common/config/shared/trust-certificates:/harbor_cust_cert:ro
    depends_on:
      - log
    networks:
      - harbor

  registryctl:
    image: goharbor/harbor-registryctl:${HARBOR_VERSION:-2.11.0}
    container_name: harbor-registryctl
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    env_file:
      - ./common/config/registryctl/env
    volumes:
      - ${HARBOR_DATA_VOLUME:-/data}/registry:/storage
      - ./common/config/registry/:/etc/registry/:ro
      - ./common/config/registryctl/config.yml:/etc/registryctl/config.yml:ro
      - ./common/config/shared/trust-certificates:/harbor_cust_cert:ro
    depends_on:
      - log
    networks:
      - harbor

  core:
    image: goharbor/harbor-core:${HARBOR_VERSION:-2.11.0}
    container_name: harbor-core
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    env_file:
      - ./common/config/core/env
    volumes:
      - ${HARBOR_DATA_VOLUME:-/data}/ca_download:/etc/core/ca
      - ${HARBOR_DATA_VOLUME:-/data}:/data
      - ./common/config/core/certificates:/etc/core/certificates:ro
      - ./common/config/core/app.conf:/etc/core/app.conf:ro
      - ${HARBOR_DATA_VOLUME:-/data}/secret/core/private_key.pem:/etc/core/private_key.pem:ro
      - ${HARBOR_DATA_VOLUME:-/data}/secret/keys/secretkey:/etc/core/key:ro
      - ./common/config/shared/trust-certificates:/harbor_cust_cert:ro
    depends_on:
      - log
      - registry
      - registryctl
      - postgresql
      - redis
    networks:
      - harbor

  portal:
    image: goharbor/harbor-portal:${HARBOR_VERSION:-2.11.0}
    container_name: harbor-portal
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ./common/config/portal/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - log
    networks:
      - harbor

  jobservice:
    image: goharbor/harbor-jobservice:${HARBOR_VERSION:-2.11.0}
    container_name: harbor-jobservice
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    env_file:
      - ./common/config/jobservice/env
    volumes:
      - ${HARBOR_DATA_VOLUME:-/data}/job_logs:/var/log/jobs
      - ./common/config/jobservice/config.yml:/etc/jobservice/config.yml:ro
      - ./common/config/shared/trust-certificates:/harbor_cust_cert:ro
    depends_on:
      - core
      - log
    networks:
      - harbor

  proxy:
    image: goharbor/nginx-photon:${HARBOR_VERSION:-2.11.0}
    container_name: harbor-nginx
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ./common/config/nginx:/etc/nginx:ro
      - ./common/config/shared/trust-certificates:/harbor_cust_cert:ro
    ports:
      - "127.0.0.1:${HARBOR_HTTP_PORT:-8080}:8080"
    depends_on:
      - registry
      - core
      - portal
      - log
    networks:
      - harbor

  trivy-adapter:
    image: goharbor/trivy-adapter-photon:${HARBOR_VERSION:-2.11.0}
    container_name: harbor-trivy-adapter
    restart: always
    cap_drop:
      - ALL
    env_file:
      - ./common/config/trivy-adapter/env
    volumes:
      - ${HARBOR_DATA_VOLUME:-/data}/trivy-adapter/trivy:/home/scanner/.cache/trivy
      - ${HARBOR_DATA_VOLUME:-/data}/trivy-adapter/reports:/home/scanner/.cache/reports
      - ./common/config/shared/trust-certificates:/harbor_cust_cert:ro
    depends_on:
      - log
      - redis
    networks:
      - harbor

networks:
  harbor:
    driver: bridge
