version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: sip3-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sip3
      MYSQL_USER: sip3
      MYSQL_PASSWORD: sip3pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sip3", "-psip3pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: sip3-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SIP3__DATABASE__URL: "mysql://sip3:sip3pass@mysql:3306/sip3"
      SIP3__SERVER__SIP_HOST: "0.0.0.0"
      SIP3__SERVER__SIP_PORT: "5060"
      SIP3__SERVER__API_HOST: "0.0.0.0"
      SIP3__SERVER__API_PORT: "3000"
      SIP3__SERVER__SIP_DOMAIN: "sip.air32.cn"
      SIP3__SERVER__PUBLIC_IP: "154.8.159.79"
      SIP3__SERVER__RTP_PORT_MIN: "10000"
      SIP3__SERVER__RTP_PORT_MAX: "10099"
      SIP3__SERVER__WEBRTC_PORT_MIN: "20000"
      SIP3__SERVER__WEBRTC_PORT_MAX: "20099"
      SIP3__AUTH__REALM: "sip.air32.cn"
      SIP3__TURN__SECRET: ${TURN_SECRET:-change_me_in_production_secret}
      SIP3__TURN__SERVER: ""
      RUST_LOG: "info"
    ports:
      - "5060:5060/udp"
      - "5061:5061/tcp"
      - "5080:5080/tcp"
      - "5443:5443/tcp"
      - "3000:3000"
      - "10000-10099:10000-10099/udp"
      - "20000-20099:20000-20099/udp"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sip3-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8030:80"

  coturn:
    image: coturn/coturn:latest
    container_name: sip3-coturn
    restart: unless-stopped
    # Ports: STUN/TURN UDP+TCP (3478), TURNS TLS (5349), relay range (49152-49200)
    # For production on Linux, consider `network_mode: host` instead.
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./docker/coturn.conf:/etc/coturn/turnserver.conf:ro
    # Override the static-auth-secret and external-ip via environment variables.
    # TURN_SECRET must match SIP3__TURN__SECRET in the backend service.
    environment:
      TURN_SECRET: ${TURN_SECRET:-change_me_in_production_secret}
    command: >-
      -n
      --log-file=stdout
      --no-cli
      --realm=${SIP3__AUTH__REALM:-sip.air32.cn}
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET:-change_me_in_production_secret}
      --external-ip=${SIP3__SERVER__PUBLIC_IP:-154.8.159.79}
      --relay-ip=0.0.0.0
      --min-port=49152
      --max-port=49200
      --no-multicast-peers
      --denied-peer-ip=10.0.0.0-10.255.255.255
      --denied-peer-ip=172.16.0.0-172.31.255.255
      --denied-peer-ip=192.168.0.0-192.168.255.255

volumes:
  mysql_data:
