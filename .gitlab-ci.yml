workflow:
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - backend_test
  - frontend_build
  - docker_publish

variables:
  HARBOR_REGISTRY: harbor.air32.cn
  HARBOR_NAMESPACE: sip3
  IMAGE_TAG: git-${CI_COMMIT_SHORT_SHA}

default:
  tags:
    - linux

backend_test:
  stage: backend_test
  image: rust:1.95
  script:
    - cd backend
    - cargo fmt -- --check
    - cargo build
    - cargo test
    - cargo clippy -- -D warnings

frontend_build:
  stage: frontend_build
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run build

docker_publish:
  stage: docker_publish
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  needs:
    - backend_test
    - frontend_build
  script:
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
    - docker build -f docker/Dockerfile.backend -t "harbor.air32.cn/sip3/backend:$IMAGE_TAG" .
    - docker build -f docker/Dockerfile.frontend -t "harbor.air32.cn/sip3/frontend:$IMAGE_TAG" .
    - docker push "harbor.air32.cn/sip3/backend:$IMAGE_TAG"
    - docker push "harbor.air32.cn/sip3/frontend:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
